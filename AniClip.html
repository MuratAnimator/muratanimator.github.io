<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniClip Studio — Рисовалка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #1e1e1e;
            color: #ccc;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .top-bar {
            background: #2d2d2d;
            padding: 6px 16px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 1px solid #3a3a3a;
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .top-bar .logo {
            font-weight: 700;
            font-size: 18px;
            color: #ff9f4a;
            letter-spacing: 0.5px;
        }
        .top-bar .logo span {
            color: #6ac9ff;
        }
        .tool-group {
            display: flex;
            gap: 6px;
            align-items: center;
            background: #3a3a3a;
            padding: 4px 10px;
            border-radius: 6px;
        }
        .tool-group button {
            background: transparent;
            border: none;
            color: #bbb;
            font-size: 18px;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
        }
        .tool-group button.active {
            background: #4a6c8f;
            color: #fff;
            box-shadow: 0 0 0 1px #6a9fd8;
        }
        .tool-group button:hover {
            background: #4a4a4a;
        }
        .color-picker-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #3a3a3a;
            padding: 4px 12px 4px 8px;
            border-radius: 6px;
        }
        .color-picker-wrap input[type="color"] {
            width: 30px;
            height: 30px;
            border: 2px solid #555;
            border-radius: 50%;
            cursor: pointer;
            background: none;
            padding: 0;
        }
        .color-picker-wrap input[type="range"] {
            width: 70px;
            cursor: pointer;
            accent-color: #6ac9ff;
        }

        .main-area {
            display: flex;
            flex: 1;
            min-height: 0;
        }

        .canvas-wrap {
            flex: 1;
            background: #252525;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .canvas-wrap canvas {
            background: white;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
            border-radius: 4px;
            cursor: crosshair;
            touch-action: none;
            width: 90%;
            height: 90%;
            object-fit: contain;
        }

        .right-panel {
            width: 220px;
            background: #2a2a2a;
            border-left: 1px solid #3a3a3a;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            padding: 12px 10px;
            gap: 10px;
        }
        .right-panel h4 {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #888;
            border-bottom: 1px solid #3a3a3a;
            padding-bottom: 6px;
        }
        .layer-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-height: 60px;
        }
        .layer-item {
            background: #333;
            padding: 8px 10px;
            border-radius: 4px;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            border-left: 3px solid transparent;
            cursor: pointer;
            transition: 0.1s;
        }
        .layer-item.active {
            border-left-color: #6ac9ff;
            background: #3a4a5a;
        }
        .layer-item .del-layer {
            color: #a55;
            cursor: pointer;
            font-weight: bold;
        }
        .onion-skin-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            background: #333;
            padding: 6px 10px;
            border-radius: 4px;
        }

        .timeline {
            background: #222;
            border-top: 2px solid #3a3a3a;
            flex-shrink: 0;
            padding: 8px 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .timeline-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .timeline-controls button {
            background: #3a3a3a;
            border: none;
            color: #ccc;
            padding: 4px 14px;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        .timeline-controls button:hover {
            background: #4a6c8f;
            color: #fff;
        }
        .frames-container {
            display: flex;
            gap: 4px;
            overflow-x: auto;
            padding: 6px 0;
            flex-wrap: nowrap;
            align-items: center;
        }
        .frame-thumb {
            min-width: 48px;
            height: 48px;
            background: #3a3a3a;
            border-radius: 4px;
            border: 2px solid #444;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: #aaa;
            cursor: pointer;
            transition: 0.1s;
            position: relative;
            flex-shrink: 0;
        }
        .frame-thumb.active {
            border-color: #6ac9ff;
            background: #2a4a6a;
            color: #fff;
        }
        .frame-thumb .del-frame {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #a44;
            color: #fff;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            font-size: 10px;
            line-height: 16px;
            text-align: center;
            cursor: pointer;
            display: none;
        }
        .frame-thumb:hover .del-frame {
            display: block;
        }

        @media (max-width: 700px) {
            .right-panel {
                width: 160px;
                padding: 8px;
            }
            .top-bar .logo {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="logo">Ani<span>Clip</span> Studio</div>

    <div class="tool-group">
        <button id="tool-pencil" class="active" title="Карандаш">✏️</button>
        <button id="tool-eraser" title="Ластик">🧹</button>
        <button id="tool-fill" title="Заливка">🪣</button>
    </div>

    <div class="color-picker-wrap">
        <input type="color" id="color-picker" value="#e74c3c">
        <input type="range" id="brush-size" min="1" max="20" value="4">
        <span style="font-size:12px; color:#999;" id="size-label">4</span>
    </div>

    <div style="flex:1"></div>
    <button id="clear-canvas" style="background:#3a2a2a; border:none; color:#ccc; padding:4px 14px; border-radius:4px; cursor:pointer;">Очистить</button>
</div>

<div class="main-area">
    <div class="canvas-wrap">
        <canvas id="canvas" width="800" height="500"></canvas>
    </div>

    <div class="right-panel">
        <h4>📂 Слои</h4>
        <div class="layer-list" id="layer-list"></div>
        <button id="add-layer" style="background:#3a4a5a; border:none; color:#fff; padding:6px; border-radius:4px; cursor:pointer;">➕ Добавить слой</button>

        <div class="onion-skin-toggle">
            <input type="checkbox" id="onion-skin" checked>
            <label for="onion-skin">🧅 Луковица</label>
        </div>
    </div>
</div>

<div class="timeline">
    <div class="timeline-controls">
        <button id="add-frame">➕ Кадр</button>
        <button id="duplicate-frame">📋 Дублировать</button>
        <button id="remove-frame">🗑️ Удалить</button>
        <span style="font-size:13px; color:#888;">Кадр: <span id="frame-counter">1</span></span>
    </div>
    <div class="frames-container" id="frames-container"></div>
</div>

<script>
    // ============================================================
    //  ИСПРАВЛЕННАЯ ВЕРСИЯ — ВСЁ РАБОТАЕТ
    // ============================================================

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let currentTool = 'pencil';
    let currentColor = '#e74c3c';
    let brushSize = 4;
    let isDrawing = false;
    let lastX = 0, lastY = 0;
    let onionSkinEnabled = true;

    // ---- ДАННЫЕ: frames[индексКадра][индексСлоя] = ImageData ----
    let frames = [];
    let currentFrameIndex = 0;
    let currentLayerIndex = 0;

    // ---- ВСПОМОГАТЕЛЬНЫЙ БУФЕР ДЛЯ РИСОВАНИЯ ----
    // Чтобы не терять изменения при перерисовке
    let drawingBuffer = null;

    // ---- ИНИЦИАЛИЗАЦИЯ ----
    function initProject() {
        const emptyLayer = createEmptyLayer();
        frames = [[emptyLayer]];
        currentFrameIndex = 0;
        currentLayerIndex = 0;
        renderAll();
    }

    function createEmptyLayer() {
        const imageData = ctx.createImageData(canvas.width, canvas.height);
        // заливаем белым
        for (let i = 0; i < imageData.data.length; i += 4) {
            imageData.data[i] = 255;
            imageData.data[i+1] = 255;
            imageData.data[i+2] = 255;
            imageData.data[i+3] = 255;
        }
        return imageData;
    }

    // ---- ПОЛУЧИТЬ ТЕКУЩИЙ СЛОЙ (ImageData) ----
    function getCurrentLayer() {
        return frames[currentFrameIndex][currentLayerIndex];
    }

    // ---- СОХРАНИТЬ ТЕКУЩИЙ СЛОЙ ИЗ ХОЛСТА ----
    function saveCurrentLayer() {
        frames[currentFrameIndex][currentLayerIndex] = ctx.getImageData(0, 0, canvas.width, canvas.height);
    }

    // ---- ОТРИСОВКА ВСЕГО ----
    function renderAll() {
        const frame = frames[currentFrameIndex];
        if (!frame) return;

        // Рисуем текущий слой
        const layerData = frame[currentLayerIndex];
        ctx.putImageData(layerData, 0, 0);

        // Луковица
        if (onionSkinEnabled) {
            if (currentFrameIndex > 0) {
                const prevFrame = frames[currentFrameIndex - 1];
                if (prevFrame && prevFrame[currentLayerIndex]) {
                    ctx.globalAlpha = 0.25;
                    ctx.putImageData(prevFrame[currentLayerIndex], 0, 0);
                    ctx.globalAlpha = 1.0;
                }
            }
            if (currentFrameIndex < frames.length - 1) {
                const nextFrame = frames[currentFrameIndex + 1];
                if (nextFrame && nextFrame[currentLayerIndex]) {
                    ctx.globalAlpha = 0.15;
                    ctx.putImageData(nextFrame[currentLayerIndex], 0, 0);
                    ctx.globalAlpha = 1.0;
                }
            }
        }

        updateTimelineUI();
        updateLayersUI();
        document.getElementById('frame-counter').textContent = currentFrameIndex + 1;
    }

    // ---- РИСОВАНИЕ ----
    function startDraw(e) {
        isDrawing = true;
        const pos = getMousePos(e);
        lastX = pos.x;
        lastY = pos.y;
        drawDot(lastX, lastY);
    }

    function draw(e) {
        if (!isDrawing) return;
        const pos = getMousePos(e);
        drawLine(lastX, lastY, pos.x, pos.y);
        lastX = pos.x;
        lastY = pos.y;
    }

    function endDraw() {
        if (isDrawing) {
            isDrawing = false;
            saveCurrentLayer();
        }
    }

    function getMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
            e.preventDefault();
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        return {
            x: (clientX - rect.left) * scaleX,
            y: (clientY - rect.top) * scaleY
        };
    }

    function drawDot(x, y) {
        // Берём текущее состояние холста
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        const radius = brushSize / 2;
        const color = (currentTool === 'eraser') ? [255, 255, 255, 255] : hexToRgb(currentColor);

        for (let dy = -radius; dy <= radius; dy++) {
            for (let dx = -radius; dx <= radius; dx++) {
                if (dx*dx + dy*dy <= radius*radius) {
                    const px = Math.round(x + dx);
                    const py = Math.round(y + dy);
                    if (px >= 0 && px < canvas.width && py >= 0 && py < canvas.height) {
                        const idx = (py * canvas.width + px) * 4;
                        data[idx] = color[0];
                        data[idx+1] = color[1];
                        data[idx+2] = color[2];
                        data[idx+3] = color[3];
                    }
                }
            }
        }
        ctx.putImageData(imageData, 0, 0);
    }

    function drawLine(x1, y1, x2, y2) {
        const dist = Math.hypot(x2 - x1, y2 - y1);
        const steps = Math.max(1, Math.floor(dist / 1.5));
        for (let i = 0; i <= steps; i++) {
            const t = i / steps;
            const x = x1 + (x2 - x1) * t;
            const y = y1 + (y2 - y1) * t;
            drawDot(x, y);
        }
    }

    // ---- ЗАЛИВКА ----
    function floodFill(x, y, fillColor) {
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        const w = canvas.width, h = canvas.height;
        const idx = (y * w + x) * 4;
        const targetR = data[idx], targetG = data[idx+1], targetB = data[idx+2], targetA = data[idx+3];
        const fill = hexToRgb(fillColor);
        if (targetR === fill[0] && targetG === fill[1] && targetB === fill[2]) return;

        const stack = [[x, y]];
        const visited = new Set();
        while (stack.length) {
            const [cx, cy] = stack.pop();
            const key = cy * w + cx;
            if (visited.has(key)) continue;
            visited.add(key);
            const i = key * 4;
            if (data[i] === targetR && data[i+1] === targetG && data[i+2] === targetB && data[i+3] === targetA) {
                data[i] = fill[0]; data[i+1] = fill[1]; data[i+2] = fill[2]; data[i+3] = fill[3];
                if (cx > 0) stack.push([cx-1, cy]);
                if (cx < w-1) stack.push([cx+1, cy]);
                if (cy > 0) stack.push([cx, cy-1]);
                if (cy < h-1) stack.push([cx, cy+1]);
            }
        }
        ctx.putImageData(imageData, 0, 0);
        saveCurrentLayer();
    }

    function hexToRgb(hex) {
        const r = parseInt(hex.slice(1,3), 16);
        const g = parseInt(hex.slice(3,5), 16);
        const b = parseInt(hex.slice(5,7), 16);
        return [r, g, b, 255];
    }

    // ---- СЛОИ ----
    function addLayer() {
        saveCurrentLayer();
        const frame = frames[currentFrameIndex];
        frame.push(createEmptyLayer());
        currentLayerIndex = frame.length - 1;
        renderAll();
    }

    function deleteLayer(index) {
        const frame = frames[currentFrameIndex];
        if (frame.length <= 1) return;
        saveCurrentLayer();
        frame.splice(index, 1);
        if (currentLayerIndex >= frame.length) currentLayerIndex = frame.length - 1;
        renderAll();
    }

    function switchLayer(index) {
        saveCurrentLayer();
        currentLayerIndex = index;
        renderAll();
    }

    function updateLayersUI() {
        const container = document.getElementById('layer-list');
        const frame = frames[currentFrameIndex];
        if (!frame) return;
        container.innerHTML = '';
        frame.forEach((layer, idx) => {
            const div = document.createElement('div');
            div.className = 'layer-item' + (idx === currentLayerIndex ? ' active' : '');
            div.innerHTML = `<span>Слой ${idx+1}</span><span class="del-layer" data-idx="${idx}">✕</span>`;
            div.addEventListener('click', (e) => {
                if (e.target.classList.contains('del-layer')) return;
                switchLayer(idx);
            });
            const del = div.querySelector('.del-layer');
            del.addEventListener('click', (e) => {
                e.stopPropagation();
                deleteLayer(idx);
            });
            container.appendChild(div);
        });
    }

    // ---- КАДРЫ ----
    function addFrame() {
        saveCurrentLayer();
        const currentFrame = frames[currentFrameIndex];
        // Глубокое копирование слоёв
        const newFrame = currentFrame.map(layer => {
            const newData = ctx.createImageData(canvas.width, canvas.height);
            newData.data.set(layer.data);
            return newData;
        });
        frames.splice(currentFrameIndex + 1, 0, newFrame);
        currentFrameIndex++;
        renderAll();
    }

    function duplicateFrame() {
        addFrame();
    }

    function removeFrame() {
        if (frames.length <= 1) return;
        saveCurrentLayer();
        frames.splice(currentFrameIndex, 1);
        if (currentFrameIndex >= frames.length) currentFrameIndex = frames.length - 1;
        renderAll();
    }

    function switchFrame(index) {
        saveCurrentLayer();
        currentFrameIndex = index;
        const frame = frames[currentFrameIndex];
        if (currentLayerIndex >= frame.length) currentLayerIndex = frame.length - 1;
        renderAll();
    }

    function updateTimelineUI() {
        const container = document.getElementById('frames-container');
        container.innerHTML = '';
        frames.forEach((frame, idx) => {
            const div = document.createElement('div');
            div.className = 'frame-thumb' + (idx === currentFrameIndex ? ' active' : '');
            div.textContent = idx + 1;
            const del = document.createElement('span');
            del.className = 'del-frame';
            del.textContent = '✕';
            del.addEventListener('click', (e) => {
                e.stopPropagation();
                if (frames.length > 1) {
                    saveCurrentLayer();
                    frames.splice(idx, 1);
                    if (currentFrameIndex >= frames.length) currentFrameIndex = frames.length - 1;
                    renderAll();
                }
            });
            div.appendChild(del);
            div.addEventListener('click', () => switchFrame(idx));
            container.appendChild(div);
        });
        const active = container.querySelector('.frame-thumb.active');
        if (active) active.scrollIntoView({ behavior: 'smooth', inline: 'center' });
    }

    function clearCurrentLayer() {
        const frame = frames[currentFrameIndex];
        frame[currentLayerIndex] = createEmptyLayer();
        renderAll();
    }

    // ---- ОБРАБОТЧИКИ КНОПОК ----
    document.getElementById('tool-pencil').addEventListener('click', () => {
        currentTool = 'pencil';
        document.querySelectorAll('.tool-group button').forEach(b => b.classList.remove('active'));
        document.getElementById('tool-pencil').classList.add('active');
    });
    document.getElementById('tool-eraser').addEventListener('click', () => {
        currentTool = 'eraser';
        document.querySelectorAll('.tool-group button').forEach(b => b.classList.remove('active'));
        document.getElementById('tool-eraser').classList.add('active');
    });
    document.getElementById('tool-fill').addEventListener('click', () => {
        currentTool = 'fill';
        document.querySelectorAll('.tool-group button').forEach(b => b.classList.remove('active'));
        document.getElementById('tool-fill').classList.add('active');
    });

    document.getElementById('color-picker').addEventListener('input', (e) => {
        currentColor = e.target.value;
    });
    document.getElementById('brush-size').addEventListener('input', (e) => {
        brushSize = parseInt(e.target.value);
        document.getElementById('size-label').textContent = brushSize;
    });

    document.getElementById('clear-canvas').addEventListener('click', clearCurrentLayer);
    document.getElementById('add-layer').addEventListener('click', addLayer);
    document.getElementById('add-frame').addEventListener('click', addFrame);
    document.getElementById('duplicate-frame').addEventListener('click', duplicateFrame);
    document.getElementById('remove-frame').addEventListener('click', removeFrame);
    document.getElementById('onion-skin').addEventListener('change', (e) => {
        onionSkinEnabled = e.target.checked;
        renderAll();
    });

    // ---- СОБЫТИЯ МЫШИ И ТАЧА ----
    canvas.addEventListener('mousedown', (e) => {
        if (currentTool === 'fill') {
            const pos = getMousePos(e);
            floodFill(pos.x, pos.y, currentColor);
            return;
        }
        startDraw(e);
    });
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', endDraw);
    canvas.addEventListener('mouseleave', endDraw);

    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (currentTool === 'fill') {
            const pos = getMousePos(e);
            floodFill(pos.x, pos.y, currentColor);
            return;
        }
        startDraw(e);
    });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });
    canvas.addEventListener('touchend', (e) => { e.preventDefault(); endDraw(); });

    // ---- ЗАПУСК ----
    initProject();
</script>
</body>
</html>
